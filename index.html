<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Endless Text Heart (Smooth)</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });

  //  SETTINGS
  let PHRASE = "I love you";
  const BG = "#000";
  const TEXT_COLOR = "rgba(255, 170, 230, 0.98)";
  const GLOW_COLOR = "rgba(255, 120, 210, 0.95)";

  const CHECK_DPR_MAX = 2;      
  const FONT_FAMILY = "Arial, sans-serif";
  const BASE_FONT = 18;         
  const SPACING_PX = 28;        
  const SPEED = 0.75;           
  const PULSE = 0.045;          
  const PULSE_SPEED = 0.03;     
  const HEART_SAMPLES = 1800;   
  const LUT_STEP = 0.20;        

  
  let W = 0, H = 0, dpr = 1;
  let sprite = null;
  let spriteW = 0, spriteH = 0;

  
  let lut = [];
  let lutCount = 0;

  function resize() {
    dpr = Math.max(1, Math.min(CHECK_DPR_MAX, window.devicePixelRatio || 1));
    W = Math.floor(window.innerWidth);
    H = Math.floor(window.innerHeight);

    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    buildSprite();    
    buildHeartLUT();  
  }

  
  function heartPoint(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return { x, y }; // x ~ [-16..16], y ~ [-17..13]
  }

  function buildHeartLUT() {
   
    const pts = [];
    for (let i = 0; i <= HEART_SAMPLES; i++) {
      const t = (i / HEART_SAMPLES) * Math.PI * 2;
      pts.push(heartPoint(t));
    }

    
    lut = [];
    let acc = 0;
    lut.push({ x: pts[0].x, y: pts[0].y });

    for (let i = 1; i < pts.length; i++) {
      const a = pts[i-1], b = pts[i];
      const dx = b.x - a.x, dy = b.y - a.y;
      const seg = Math.hypot(dx, dy);
      if (seg <= 1e-6) continue;

      let t = 0;
      while (t < seg) {
        const need = LUT_STEP - acc;
        const step = Math.min(need, seg - t);
        t += step;
        acc += step;

        if (acc >= LUT_STEP - 1e-9) {
          const r = t / seg;
          lut.push({ x: a.x + dx * r, y: a.y + dy * r });
          acc = 0;
        }
      }
    }

    lutCount = lut.length;
  }

  function buildSprite() {
   
    const minSide = Math.min(W, H);
    const fontSize = Math.max(12, Math.floor(BASE_FONT * (minSide / 700)));

    
    const off = document.createElement("canvas");
    const octx = off.getContext("2d");

    octx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
    const metrics = octx.measureText(PHRASE);
    const pad = Math.ceil(fontSize * 1.2);

    spriteW = Math.ceil(metrics.width + pad * 2);
    spriteH = Math.ceil(fontSize + pad * 2);

    off.width = spriteW;
    off.height = spriteH;

    
    octx.clearRect(0, 0, spriteW, spriteH);
    octx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
    octx.textAlign = "center";
    octx.textBaseline = "middle";

    octx.shadowColor = GLOW_COLOR;
    octx.shadowBlur = Math.max(8, Math.floor(fontSize * 1.3));
    octx.fillStyle = TEXT_COLOR;
    octx.fillText(PHRASE, spriteW / 2, spriteH / 2);

    
    octx.shadowBlur = 0;
    octx.fillStyle = TEXT_COLOR;
    octx.fillText(PHRASE, spriteW / 2, spriteH / 2);

    sprite = off;
  }

  
  window.addEventListener("click", () => {
    const p = prompt("Phrase:", PHRASE);
    if (p && p.trim()) {
      PHRASE = p.trim();
      buildSprite();
    }
  });

  window.addEventListener("resize", resize);
  resize();

  let time = 0;

  function frame() {
    time += 1;

   
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

   
    const minSide = Math.min(W, H);
    const baseScale = (minSide / 40);
    const pulse = 1 + PULSE * Math.sin(time * PULSE_SPEED);
    const scale = baseScale * pulse;

    const cx = W * 0.5;
    const cy = H * 0.52;

    
    const stepPx = LUT_STEP * scale;
    const skip = Math.max(1, Math.round(SPACING_PX / stepPx));
    const count = Math.floor(lutCount / skip);

    
    const shift = Math.floor((time * SPEED) % lutCount);

    
    for (let i = 0; i < count; i++) {
      const idx = (shift + i * skip) % lutCount;
      const p = lut[idx];

      const x = cx + p.x * scale;
      const y = cy - p.y * scale;

      
      ctx.drawImage(sprite, x - spriteW / 2, y - spriteH / 2);
    }

    
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.beginPath();
    ctx.fillStyle = "rgba(255,160,230,0.25)";
    ctx.ellipse(cx, cy - scale * 2.0, scale * 1.1, scale * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
